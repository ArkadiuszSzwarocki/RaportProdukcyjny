[pytest]
# Run tests located in the tests/ folder and ignore auxiliary script folders
testpaths = tests
norecursedirs = .venv scripts tools __pycache__
python_files = test_*.py
python_classes = Test*
# Minimum Python version
minversion = 7.0
# Add verbose output, exclude legacy broken test files with import errors, and ignore non-test scratch scripts
addopts = -v --tb=short --ignore=tests/test_mom.py --ignore=tests/test_generate_tts.py
markers =
    require_db: mark test as requiring a live MySQL database connection
