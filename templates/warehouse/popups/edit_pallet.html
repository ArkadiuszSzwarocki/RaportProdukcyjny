<div class="p-10" data-popup-title="{{ _('edytuj_palete') }}">
    <h3 class="popup-title">✏️ {{ _('edytuj_palete') }}</h3>
    <form action="{{ url_for('warehouse.edytuj_palete', paleta_id=paleta_id) }}" method="POST">
      <input type="hidden" name="linia" value="{{ linia or 'PSD' }}">
      <input type="hidden" name="sekcja" value="{{ sekcja or 'Workowanie' }}">
      <div class="form-group mb-15">
        <label class="form-label" for="waga_palety">{{ _('waga_kg_symbol') }}</label>
        <input id="waga_palety" name="waga_palety" type="number" step="1" min="0" value="{{ waga or '' }}" required class="form-control" autofocus title="{{ _('waga_palety_kg_info') }}" placeholder="0">
      </div>
      <div class="popup-button-group">
        <button type="submit" class="btn-action btn-save">{{ _('zapisz') }}</button>
        <button type="button" class="btn-action btn-outline" data-action="close-popup">{{ _('anuluj') }}</button>
      </div>
    </form>
</div>
