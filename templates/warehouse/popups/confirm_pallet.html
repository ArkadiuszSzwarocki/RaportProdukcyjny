<form id="potwierdz-form" action="{{ url_for('warehouse.potwierdz_palete', paleta_id=paleta_id) }}" method="POST" onsubmit="submitConfirmForm(event)" style="display:flex; flex-direction:column; gap:12px;">
<input type="hidden" name="linia" value="{{ linia or 'PSD' }}">
  <div class="form-field">
    <label for="waga_palety">Waga rzeczywista (kg)</label>
    <input id="waga_palety" name="waga_palety" type="number" min="0" step="0.1" value="" required class="input-sm" placeholder="Zważ paletę i wpisz wagę">
  </div>
  <div style="display:flex; gap:8px;">
    <button type="submit" class="btn-action btn-success" style="flex:1;" data-default-label="{{ _('zatwierdz_btn') }}">{{ _('zatwierdz_btn') }}</button>
    <button type="button" class="btn-action btn-action-cancel" style="flex:1;" data-action="close-popup">ANULUJ</button>
  </div>
</form>

<div id="difference-modal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.55); z-index:99999; align-items:center; justify-content:center; padding:32px;">
  <div style="background:white; border-radius:24px; padding:48px; max-width:980px; width:min(980px, 95vw); box-shadow:0 28px 90px rgba(15,23,42,0.4); text-align:center; position:relative; z-index:100000;">
    <div style="font-size:64px; margin-bottom:20px;">⚠️</div>
    <h3 style="margin:0 0 16px 0; color:#dc2626; font-size:28px; font-weight:800;">Niezgodność wagowa</h3>
    <p style="margin:0 0 24px 0; color:#475569; font-size:20px; line-height:1.7;">
      Wykryto niezgodność wagową z paletą matką/deklaracją o <strong id="modal-diff"></strong> kg.
    </p>
    <p style="margin:0 0 32px 0; color:#64748b; font-size:18px;">Wybierz, czy przyjąć mimo różnicy, czy wrócić bez akceptacji.</p>
    <div style="display:flex; gap:12px; justify-content:center; flex-wrap:wrap;">
      <button type="button" onclick="acceptDifferenceAndConfirm()" style="background:#16a34a; color:white; border:none; padding:16px 28px; border-radius:14px; font-weight:700; cursor:pointer; font-size:18px;">AKCEPTUJ MIMO RÓŻNICY</button>
      <button type="button" onclick="rejectDifferenceAndReturn()" style="background:#e2e8f0; color:#1e293b; border:none; padding:16px 28px; border-radius:14px; font-weight:700; cursor:pointer; font-size:18px;">NIE AKCEPTUJ I POWRÓT</button>
    </div>
  </div>
</div>

<script>
  var pendingConfirmPayload = null;

  function setSubmitButtonState(isBusy, busyLabel) {
    var btn = document.querySelector('#potwierdz-form button[type="submit"]');
    if (!btn) return;
    if (isBusy) {
      btn.disabled = true;
      btn.innerHTML = busyLabel || 'TRWA ZAPISYWANIE...';
      return;
    }
    btn.disabled = false;
    btn.innerHTML = btn.getAttribute('data-default-label') || 'ZATWIERDZ';
  }

  function closePopupAndReload() {
    try {
      var qp = document.querySelector('.quick-popup');
      if (qp && qp.parentNode) {
        var closeBtn = qp.parentNode.querySelector('.qp-close');
        if (closeBtn) closeBtn.click();
      }
    } catch (e) {}
    setTimeout(function () { location.reload(); }, 400);
  }

  function postConfirmRequest(payload) {
    var body = Object.keys(payload)
      .map(function (key) { return encodeURIComponent(key) + '=' + encodeURIComponent(payload[key]); })
      .join('&');

    return fetch('{{ url_for("warehouse.potwierdz_palete", paleta_id=paleta_id) }}', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/x-www-form-urlencoded',
        'X-Requested-With': 'XMLHttpRequest'
      },
      body: body
    }).then(function (response) {
      return response.json().then(function (json) {
        return { ok: response.ok, status: response.status, data: json };
      }).catch(function () {
        return { ok: response.ok, status: response.status, data: null };
      });
    });
  }

  function finalizeConfirm(values, forceAccept) {
    var payload = {
      waga_palety: values.waga,
      linia: values.linia
    };
    if (forceAccept) {
      payload.force_accept = '1';
    }

    setSubmitButtonState(true, 'TRWA ZAPISYWANIE...');
    postConfirmRequest(payload)
      .then(function (result) {
        var j = result.data || {};
        if (j.success) {
          document.getElementById('difference-modal').style.display = 'none';
          closePopupAndReload();
          return;
        }

        setSubmitButtonState(false);
        if (j.requires_confirmation || j.has_difference) {
          pendingConfirmPayload = values;
          document.getElementById('modal-diff').textContent = (j.difference != null ? j.difference : '?');
          showDifferenceModal();
          return;
        }
        alert('Błąd: ' + (j.message || 'Nie udało się zatwierdzić'));
      })
      .catch(function (error) {
        setSubmitButtonState(false);
        alert('Błąd sieci: ' + error.message);
      });
  }

  function submitConfirmForm(event) {
    event.preventDefault();
    var wagaInput = document.getElementById('waga_palety');
    var waga = parseFloat(wagaInput.value);
    
    if (!isFinite(waga) || waga <= 0) {
      alert('Wpisz poprawną wagę');
      return;
    }
    
    var liniaInput = document.querySelector('input[name="linia"]');
    var linia = liniaInput ? String(liniaInput.value || '') : '';
    var values = { waga: waga, linia: linia };

    setSubmitButtonState(true, 'SPRAWDZANIE...');
    postConfirmRequest({
      waga_palety: waga,
      linia: linia,
      check_only: '1'
    })
      .then(function (result) {
        var j = result.data || {};
        if (!j.success) {
          setSubmitButtonState(false);
          alert('Błąd: ' + (j.message || 'Nie udało się sprawdzić różnicy')); 
          return;
        }

        if (j.has_difference) {
          pendingConfirmPayload = values;
          document.getElementById('modal-diff').textContent = (j.difference != null ? j.difference : '?');
          showDifferenceModal();
          setSubmitButtonState(false);
          return;
        }

        finalizeConfirm(values, false);
      })
      .catch(function (error) {
        setSubmitButtonState(false);
        alert('Błąd sieci: ' + error.message);
      });
  }

  function acceptDifferenceAndConfirm() {
    if (!pendingConfirmPayload) {
      return;
    }
    finalizeConfirm(pendingConfirmPayload, true);
  }

  function rejectDifferenceAndReturn() {
    pendingConfirmPayload = null;
    document.getElementById('difference-modal').style.display = 'none';
    setSubmitButtonState(false);
    closePopupAndReload();
  }

  function showDifferenceModal() {
    var modal = document.getElementById('difference-modal');
    if (!modal) return;
    if (!modal.dataset.attached) {
      try {
        document.body.appendChild(modal);
        modal.dataset.attached = '1';
      } catch (e) {}
    }
    modal.style.display = 'flex';
  }
</script>
