<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Etykieta ZPL - {{ nr_palety }}</title>
    <style>
        @page {
            size: 101.6mm 152.4mm;
            margin: 0;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #e5e7eb;
            color: #000;
        }

        .screen {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            padding: 12px;
        }

        .toolbar {
            width: 100%;
            max-width: 560px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 8px;
            background: #fff;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            padding: 8px 10px;
        }

        .toolbar-note {
            font-size: 12px;
            color: #334155;
        }

        .toolbar-btn {
            border: 1px solid #0f172a;
            background: #0f172a;
            color: #fff;
            border-radius: 8px;
            padding: 8px 12px;
            font-weight: 700;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .toolbar-btn:hover {
            background: #1e293b;
        }

        .label-container {
            width: 101.6mm;
            height: 152.4mm;
            background: #fff;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .label-container img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .meta {
            margin-top: 3px;
            width: 100%;
            max-width: 560px;
            font-size: 11px;
            color: #475569;
            display: flex;
            justify-content: space-between;
        }

        @media print {
            body {
                background: #fff;
            }

            .screen {
                padding: 0;
                gap: 0;
                min-height: auto;
            }

            .toolbar,
            .meta {
                display: none;
            }

            .label-container {
                box-shadow: none;
                border: none;
                margin: 0;
                padding: 0;
            }
        }
    </style>
</head>
<body>
    <div class="screen">
        <div class="toolbar">
            <span class="toolbar-note">Podgląd ZPL na żywo</span>
            <button class="toolbar-btn" onclick="window.print()">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="6 9 6 2 18 2 18 9"></polyline>
                    <path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"></path>
                    <rect x="6" y="14" width="12" height="8"></rect>
                </svg>
                Drukuj zwykły
            </button>
        </div>

        <div class="label-container">
            <!-- Labelary API returns the image of the ZPL -->
            <img src="http://api.labelary.com/v1/printers/8dpmm/labels/4x6/0/{{ zpl_string | urlencode }}" alt="ZPL Preview">
        </div>

        <div class="meta">
            <span>Linia: {{ linia }}</span>
            <span>Wygenerowano: {{ generated_at }}</span>
        </div>
    </div>

    {% if autoprint %}
    <script>
        window.onload = function() {
            setTimeout(function() {
                window.print();
            }, 500);
        };
    </script>
    {% endif %}
</body>
</html>
