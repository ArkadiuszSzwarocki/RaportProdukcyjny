<div class="p-10" data-popup-title="🗑️ Usuń zasyp">
    <p>Czy na pewno chcesz usunąć zasyp o id <strong>{{ zasyp_id or szarza_id }}</strong>?</p>
    <form action="{{ url_for('warehouse.usun_zasyp', id=(zasyp_id or szarza_id)) }}" method="POST">
        <input type="hidden" name="linia" value="{{ linia or 'PSD' }}">
        <input type="hidden" name="sekcja" value="{{ sekcja or 'Zasyp' }}">
        <input type="hidden" name="data_planu" value="{{ data_planu or '' }}">
        <div class="button-group">
            <button type="submit" class="btn-action btn-danger">{{ _('usun_btn') }}</button>
            <button type="button" class="btn-action btn-action-cancel" data-action="close-popup">ANULUJ</button>
        </div>
    </form>
</div>
