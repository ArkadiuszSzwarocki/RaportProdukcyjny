<div style="display: flex; align-items: center; gap: 8px; width: 100%; margin-bottom: 15px;">
    
    <!-- PRZEŁĄCZNIK WIDOKU (Po lewej, przed wyszukiwaniem) -->
    <button onclick="toggleViewMode()" id="viewToggleBtn" title="Zmień widok"
            style="padding: 10px; background: white; border: 1px solid #dbe3ea; color: #64748b; border-radius: 12px; display: flex; align-items: center; justify-content: center; cursor: pointer; min-width: 44px; width: 44px; min-height: 44px; box-sizing: border-box; flex-shrink: 0; margin: 0;">
        <span class="material-icons" id="viewToggleIcon">view_module</span>
    </button>

    <!-- WYSZUKIWARKA PRODUKTU -->
    <div style="position: relative; flex: 2; min-width: 200px;">
        <span class="material-icons" style="position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: #94a3b8; font-size: 20px;">search</span>
        <input type="text" id="searchInput" placeholder="Szukaj palety..." 
               style="width: 100%; padding: 12px 40px 12px 44px; border: 1px solid #dbe3ea; border-radius: 12px; font-size: 15px; box-shadow: inset 0 2px 4px rgba(0,0,0,0.02); box-sizing: border-box; background: white;">
        <span class="material-icons" id="clearSearchBtn" onclick="document.getElementById('searchInput').value=''; document.getElementById('searchInput').dispatchEvent(new Event('input')); this.style.display='none';" style="position: absolute; right: 14px; top: 50%; transform: translateY(-50%); color: #94a3b8; font-size: 20px; cursor: pointer; display: none;">close</span>
    </div>
    
    <!-- WYSZUKIWARKA LOKALIZACJI (Multiselect) -->
    <div style="position: relative; flex: 1; min-width: 200px;" id="locationDropdownContainer">
        <button id="locationDropdownBtn" onclick="toggleLocationDropdown()" style="width: 100%; padding: 12px 14px; border: 1px solid #dbe3ea; border-radius: 12px; font-size: 15px; background: white; text-align: left; cursor: pointer; display: flex; justify-content: space-between; align-items: center; color: #64748b;">
            <span style="display: flex; align-items: center; gap: 8px;">
                <span class="material-icons" style="font-size: 20px;">place</span>
                <span id="locationDropdownLabel">Filtruj Lokacje</span>
            </span>
            <span class="material-icons" style="font-size: 20px;">expand_more</span>
        </button>
        
        <div id="locationDropdownMenu" style="display: none; position: absolute; top: 100%; left: 0; right: 0; margin-top: 8px; background: white; border: 1px solid #dbe3ea; border-radius: 12px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); z-index: 100; max-height: 300px; overflow-y: auto; padding: 8px;">
            <div style="padding: 8px; border-bottom: 1px solid #f1f5f9; display: flex; gap: 10px;">
                <button onclick="selectAllLocations(true)" style="flex: 1; padding: 6px; background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 6px; cursor: pointer; font-size: 12px;">Wszystkie</button>
                <button onclick="selectAllLocations(false)" style="flex: 1; padding: 6px; background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 6px; cursor: pointer; font-size: 12px;">Żadne</button>
            </div>
            <div id="locationCheckboxes" style="padding-top: 8px; display: flex; flex-direction: column; gap: 4px;">
                <!-- Wypełniane przez JS -->
            </div>
        </div>
    </div>
    
    <!-- PRZYCISK DRUKUJ -->
    <button onclick="printFilteredPallets()" class="btn-action" style="padding: 10px 20px; background: #f8fafc; border: 1px solid #cbd5e1; color: #475569; border-radius: 12px; font-weight: 700; display: flex; align-items: center; gap: 8px; cursor: pointer; flex-shrink: 0;">
        <span class="material-icons">print</span> Wydrukuj Listę
    </button>
    
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const searchInput = document.getElementById('searchInput');
            const clearBtn = document.getElementById('clearSearchBtn');
            
            const toggleClearBtn = () => {
                if (searchInput.value.length > 0) clearBtn.style.display = 'block';
                else clearBtn.style.display = 'none';
            };

            searchInput.addEventListener('input', toggleClearBtn);
            setTimeout(toggleClearBtn, 500);
        });

        // Obsługa kliknięć poza dropdownem
        document.addEventListener('click', function(e) {
            const container = document.getElementById('locationDropdownContainer');
            if (container && !container.contains(e.target)) {
                document.getElementById('locationDropdownMenu').style.display = 'none';
            }
        });
        
        function toggleLocationDropdown() {
            const menu = document.getElementById('locationDropdownMenu');
            menu.style.display = menu.style.display === 'none' ? 'block' : 'none';
        }
    </script>
</div>
