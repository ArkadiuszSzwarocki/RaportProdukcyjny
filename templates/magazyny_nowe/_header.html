<div class="dashboard-top-row d-flex justify-between flex-wrap align-center gap-10 w-100 mb-20" style="gap: 10px;">
    <div class="header-title-row d-flex align-center gap-10" style="flex: 1; min-width: 200px;">
        <h2 class="header-title m-0 d-flex align-center gap-8" style="font-size: 20px;">
            <span class="material-icons text-primary" style="font-size: 24px;">warehouse</span>
            <strong>Magazyn Centralny</strong>
        </h2>
    </div>
    <div class="header-actions-row" style="display: flex; gap: 8px; align-items: center; flex-wrap: wrap; width: 100%; max-width: 400px; justify-content: flex-end;">
        <div style="position: relative; display: flex; align-items: center; flex: 1; min-width: 150px;">
            <span class="material-icons" style="position: absolute; left: 10px; color: #94a3b8; font-size: 18px;">search</span>
            <input type="text" id="searchInput" placeholder="Szukaj palety..." 
                   style="padding: 10px 10px 10px 38px; border: 1px solid #dbe3ea; border-radius: 12px; font-size: 14px; width: 100%; box-shadow: inset 0 2px 4px rgba(0,0,0,0.02);">
        </div>
        
        <!-- PRZEŁĄCZNIK WIDOKU (Lista/Kafelki) -->
        <button onclick="toggleViewMode()" class="btn-action" id="viewToggleBtn" title="Zmień widok"
                style="padding: 10px; background: white; border: 1px solid #dbe3ea; color: #64748b; border-radius: 12px; display: flex; align-items: center; justify-content: center; cursor: pointer;">
            <span class="material-icons" id="viewToggleIcon">view_module</span>
        </button>
    </div>
</div>
