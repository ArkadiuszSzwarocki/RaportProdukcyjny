<!-- OVERLAY DLA ZWOLNIENIA MIESZALNIKA AGRO -->
<div id="zwolnienie-banner" style="display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(39, 174, 96, 0.95); z-index: 999999; flex-direction: column; justify-content: center; align-items: center; text-align: center; color: white; backdrop-filter: blur(10px);">
    <div class="agro-banner-pulse-sign" aria-hidden="true" style="width: 150px; height: 150px; min-width: 150px; font-size: 100px; background: #ffffff; color: #27ae60; border-color: #ffffff; animation: agroPulseSign 1.1s ease-in-out infinite;">!</div>
    <h1 style="font-size: 6vw; font-weight: 900; line-height: 1.2; text-shadow: 2px 2px 15px rgba(0,0,0,0.4); padding: 0 40px; margin-top: 20px;">
        LABORATORIUM ZWOLNIŁO MIESZALNIK<br>DO WYSYPU
    </h1>
    <button id="zwolnienie-banner-close" style="margin-top: 60px; padding: 20px 50px; font-size: 30px; font-weight: 900; background: white; color: #27ae60; border: none; border-radius: 16px; cursor: pointer; box-shadow: 0 8px 30px rgba(0,0,0,0.3); transition: transform 0.2s;">
        ZROZUMIAŁEM !
    </button>
</div>
