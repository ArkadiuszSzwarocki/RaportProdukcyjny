<script>
    // PWA & Fullscreen
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('/static/sw.js').catch(() => {});
        });
    }

    let deferredPrompt;
    window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault();
        deferredPrompt = e;
        const isStandalone = window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone;
        const lastDismissed = localStorage.getItem('pwaPromptDismissed');
        if (!isStandalone && (!lastDismissed || (Date.now() - lastDismissed > 24 * 60 * 60 * 1000))) {
            setTimeout(() => { 
                const m = document.getElementById('pwaInstallModal');
                if (m) m.style.display = 'flex';
            }, 3000);
        }
    });

    function closePwaModal(isDismiss) {
        const m = document.getElementById('pwaInstallModal');
        if (m) m.style.display = 'none';
        if (isDismiss) localStorage.setItem('pwaPromptDismissed', Date.now());
    }

    function showPwaManualGuide() {
        if (deferredPrompt) deferredPrompt.prompt();
        else alert("Użyj menu przeglądarki: 'Zainstaluj aplikację'");
    }

    function toggleFullScreen() {
        if (!document.fullscreenElement) document.documentElement.requestFullscreen().catch(() => {});
        else if (document.exitFullscreen) document.exitFullscreen();
    }

    // Notifications logic
    (function() {
        const state = { initialized: false, shownIds: new Set(), notifications: [] };
        function getElements() {
            return {
                toggle: document.getElementById('notificationsToggle'),
                menu: document.getElementById('notificationsMenu'),
                badge: document.getElementById('notificationsBadge'),
                list: document.getElementById('notificationsList'),
                markAll: document.getElementById('notificationsMarkAll')
            };
        }
        function render() {
            const e = getElements();
            if (!e.list || !e.badge) return;
            const badgeCount = state.notifications.length;
            e.badge.style.display = badgeCount > 0 ? 'inline-block' : 'none';
            e.badge.textContent = badgeCount > 99 ? '99+' : badgeCount;
        }
        let notifsInterval = null;
        async function fetchNotifs() {
            try {
                const r = await fetch('/api/notifications?limit=20', {
                    credentials: 'same-origin',
                    headers: { 'X-Requested-With': 'XMLHttpRequest' }
                });
                if (r.status === 401) {
                    // Session expired — stop polling and redirect to login immediately
                    if (notifsInterval) clearInterval(notifsInterval);
                    window.location.replace('/login');
                    return;
                }
                if (r.ok) {
                    const d = await r.json();
                    state.notifications = d.notifications || [];
                    render();
                }
            } catch(e) {}
        }
        document.addEventListener('DOMContentLoaded', () => {
            fetchNotifs();
            notifsInterval = setInterval(fetchNotifs, 10000);
            const e = getElements();
            if (e.toggle) e.toggle.addEventListener('click', () => {
                const open = e.menu.style.display === 'block';
                e.menu.style.display = open ? 'none' : 'block';
            });
        });
    })();

    // Bug Report logic
    function openBugReportModal() {
        if (window.showQuickPopup) {
            showQuickPopup('🐞 Zgłoś błąd', '<form id="bugReportForm">...</form>');
        }
    }

    function ackBugIconIntro() {
        const modal = document.getElementById('bugIconIntroModal');
        if (modal) modal.style.display = 'none';
        
        fetch('/api/ack_bug_icon_intro', {
            method: 'POST',
            credentials: 'same-origin',
            headers: { 
                'Content-Type': 'application/json',
                'X-Requested-With': 'XMLHttpRequest'
            }
        }).catch(err => console.error('Failed to ack bug icon intro:', err));
    }
</script>
