<script>
    // PWA & Fullscreen
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('/static/sw.js').catch(() => {});
        });
    }

    let deferredPrompt;
    window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault();
        deferredPrompt = e;
        const isStandalone = window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone;
        const lastDismissed = localStorage.getItem('pwaPromptDismissed');
        if (!isStandalone && (!lastDismissed || (Date.now() - lastDismissed > 24 * 60 * 60 * 1000))) {
            setTimeout(() => { 
                const m = document.getElementById('pwaInstallModal');
                if (m) m.style.display = 'flex';
            }, 3000);
        }
    });

    function closePwaModal(isDismiss) {
        const m = document.getElementById('pwaInstallModal');
        if (m) m.style.display = 'none';
        if (isDismiss) localStorage.setItem('pwaPromptDismissed', Date.now());
    }

    function showPwaManualGuide() {
        if (deferredPrompt) deferredPrompt.prompt();
        else alert("Użyj menu przeglądarki: 'Zainstaluj aplikację'");
    }

    function toggleFullScreen() {
        if (!document.fullscreenElement) document.documentElement.requestFullscreen().catch(() => {});
        else if (document.exitFullscreen) document.exitFullscreen();
    }

    // Notifications logic
    (function() {
        const state = { initialized: false, shownIds: new Set(), notifications: [] };
        function getElements() {
            return {
                toggle: document.getElementById('notificationsToggle'),
                menu: document.getElementById('notificationsMenu'),
                badge: document.getElementById('notificationsBadge'),
                list: document.getElementById('notificationsList'),
                markAll: document.getElementById('notificationsMarkAll')
            };
        }

        function escapeHtml(value) {
            return String(value || '')
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        function closeMenu() {
            const e = getElements();
            if (e.menu) {
                e.menu.style.display = 'none';
                e.menu.setAttribute('aria-hidden', 'true');
            }
            if (e.toggle) {
                e.toggle.setAttribute('aria-expanded', 'false');
            }
        }

        function toggleMenu() {
            const e = getElements();
            if (!e.menu || !e.toggle) return;
            const shouldOpen = e.menu.style.display !== 'block';
            e.menu.style.display = shouldOpen ? 'block' : 'none';
            e.menu.setAttribute('aria-hidden', shouldOpen ? 'false' : 'true');
            e.toggle.setAttribute('aria-expanded', shouldOpen ? 'true' : 'false');
        }

        function render() {
            const e = getElements();
            if (!e.list || !e.badge) return;

            const userRole = "{{ session.get('rola')|default('')|lower|replace(' ', '')|replace('_', '')|replace('-', '')|trim }}";
            if (userRole === 'laborant' || userRole === 'laboratorium') {
                e.badge.style.display = 'none';
                return;
            }

            const items = Array.isArray(state.notifications) ? state.notifications : [];
            const badgeCount = items.length;
            e.badge.style.display = badgeCount > 0 ? 'inline-block' : 'none';
            e.badge.textContent = badgeCount > 99 ? '99+' : String(badgeCount);

            if (badgeCount === 0) {
                e.list.innerHTML = '<div class="notifications-empty">Brak nowych powiadomień.</div>';
                return;
            }

            e.list.innerHTML = items.map(function(item) {
                const title = escapeHtml(item.title || 'Powiadomienie');
                const message = escapeHtml(item.message || '');
                const createdAt = escapeHtml(item.created_at || '');
                const safeLink = escapeHtml(item.link_url || '');
                return [
                    '<button type="button" class="notification-item" data-id="', item.id, '" data-link="', safeLink, '">',
                    '<span class="notification-item-title">', title, '</span>',
                    '<span class="notification-item-message">', message, '</span>',
                    '<span class="notification-item-meta">', createdAt, '</span>',
                    '</button>'
                ].join('');
            }).join('');
        }

        async function markRead(notificationId) {
            const r = await fetch('/api/notifications/' + encodeURIComponent(notificationId) + '/read', {
                method: 'POST',
                credentials: 'same-origin',
                headers: { 'X-Requested-With': 'XMLHttpRequest' }
            });
            return r.ok;
        }

        async function markAllRead() {
            const r = await fetch('/api/notifications/read-all', {
                method: 'POST',
                credentials: 'same-origin',
                headers: { 'X-Requested-With': 'XMLHttpRequest' }
            });
            return r.ok;
        }

        let notifsInterval = null;
        async function fetchNotifs() {
            try {
                const r = await fetch('/api/notifications?limit=20', {
                    credentials: 'same-origin',
                    headers: { 'X-Requested-With': 'XMLHttpRequest' }
                });
                if (r.status === 401) {
                    // Session expired — stop polling and redirect to login immediately
                    if (notifsInterval) clearInterval(notifsInterval);
                    window.location.replace('/login');
                    return;
                }
                if (r.ok) {
                    const d = await r.json();
                    const notifications = Array.isArray(d.notifications) ? d.notifications : [];
                    if (state.initialized) {
                        notifications.forEach(function(item) {
                            if (!state.shownIds.has(item.id)) {
                                state.shownIds.add(item.id);
                                if (typeof showToast === 'function') {
                                    showToast((item.title || 'Powiadomienie') + ': ' + (item.message || ''), 'info');
                                }
                            }
                        });
                    } else {
                        notifications.forEach(function(item) { state.shownIds.add(item.id); });
                        state.initialized = true;
                    }
                    state.notifications = notifications;
                    render();
                }
            } catch(e) {}
        }
        document.addEventListener('DOMContentLoaded', () => {
            fetchNotifs();
            notifsInterval = setInterval(fetchNotifs, 10000);
            const e = getElements();

            if (e.toggle) {
                e.toggle.addEventListener('click', function(ev) {
                    ev.preventDefault();
                    ev.stopPropagation();
                    toggleMenu();
                });
            }

            if (e.markAll) {
                e.markAll.addEventListener('click', async function() {
                    const ok = await markAllRead();
                    if (!ok) {
                        if (typeof showToast === 'function') {
                            showToast('Nie udało się oznaczyć powiadomień.', 'warning');
                        }
                        return;
                    }
                    state.notifications = [];
                    render();
                    closeMenu();
                });
            }

            if (e.list) {
                e.list.addEventListener('click', async function(ev) {
                    const button = ev.target.closest('.notification-item');
                    if (!button) return;
                    const notificationId = button.getAttribute('data-id');
                    const linkUrl = button.getAttribute('data-link');

                    const ok = await markRead(notificationId);
                    if (!ok) {
                        if (typeof showToast === 'function') {
                            showToast('Nie udało się zapisać odczytu powiadomienia.', 'warning');
                        }
                        return;
                    }

                    state.notifications = state.notifications.filter(function(item) {
                        return String(item.id) !== String(notificationId);
                    });
                    render();
                    closeMenu();

                    if (linkUrl) {
                        window.location.href = linkUrl;
                    }
                });
            }

            document.addEventListener('click', function(ev) {
                const wrapper = document.querySelector('.notifications-wrapper');
                if (wrapper && !wrapper.contains(ev.target)) {
                    closeMenu();
                }
            });
        });

        window.closeNotificationsMenu = closeMenu;
    })();

    // Bug Report logic
    function closeBugReportModal() {
        try {
            if (window.createQuickPopup && window.createQuickPopup._lastInst) {
                try { window.createQuickPopup._lastInst.close(); } catch (e) { }
            }
            if (window.closeQuickPopup) {
                try { window.closeQuickPopup(); } catch (e) { }
            }

            // Hard fallback: force hide overlay/popup even if helper couldn't close current instance.
            var qp = document.getElementById('quickPopup');
            var qb = document.getElementById('quickBackdrop');
            if (qp) {
                qp.classList.remove('open');
                qp.setAttribute('aria-hidden', 'true');
                qp.style.display = 'none';
                qp.style.pointerEvents = 'none';
            }
            if (qb) {
                qb.classList.remove('show');
                qb.setAttribute('aria-hidden', 'true');
                qb.style.display = 'none';
                qb.style.pointerEvents = 'none';
            }
        } catch (e) { }
    }

    function openBugReportModal() {
        var html = '<form id="bugReportForm" enctype="multipart/form-data">';
        html += '<div class="form-group">';
        html += '<div class="text-muted small" style="margin-bottom:8px; line-height:1.45;">';
        html += '<strong>Jak zgłosić skutecznie:</strong><br>';
        html += '1) Co dokładnie klikasz (krok po kroku), 2) jaki jest efekt, 3) jaki efekt powinien być.<br>';
        html += 'Dodaj też gdzie problem występuje (sekcja, linia, ekran).';
        html += '</div></div>';
        html += '<div class="form-group"><label style="display:block;margin-bottom:4px;font-weight:600;">Gdzie występuje problem? (sekcja/linia/ekran):</label>';
        html += '<input type="text" name="gdzie" class="input-sm" style="width:100%;box-sizing:border-box;padding:8px;border:1px solid #cbd5e1;border-radius:6px;" placeholder="Np. Zasyp AGRO - popup dosypki" required></div>';
        html += '<div class="form-group" style="margin-top:12px;"><label style="display:block;margin-bottom:4px;font-weight:600;">Opis problemu i kroki odtworzenia:</label>';
        html += '<textarea name="opis" rows="5" class="input-sm" style="width:100%;box-sizing:border-box;padding:8px;border:1px solid #cbd5e1;border-radius:6px;resize:vertical;" placeholder="Np. 1. Wchodzę w ... 2. Klikam ... 3. Wyskakuje ..." required></textarea></div>';
        html += '<div class="form-group" style="margin-top:12px;"><label style="display:block;margin-bottom:4px;font-weight:600;">Zrzuty ekranu (maksymalnie 3 zdjęcia):</label>';
        html += '<input type="file" name="zalaczniki" accept="image/*" multiple id="bugScreenshots"></div>';
        html += '<div class="text-muted small" style="margin-top:4px;font-size:11px;color:#64748b;">Najlepiej dodaj screen z wnętrza aplikacji z widocznym komunikatem lub błędnym stanem.</div>';
        html += '<p class="text-muted small" id="bugFileCountMsg" style="margin-top:4px;font-size:11px;color:#1e293b;font-weight:700;"></p>';
        html += '<div class="d-flex gap-10 mt-15" style="display:flex;gap:10px;margin-top:20px;">';
        html += '<button type="button" class="btn-action btn-success" style="background:#16a34a;color:#fff;border:0;padding:10px 18px;border-radius:8px;font-weight:700;cursor:pointer;" onclick="submitBugReport()">Wyślij zgłoszenie</button>';
        html += '<button type="button" class="btn-action btn-cancel" style="background:#64748b;color:#fff;border:0;padding:10px 18px;border-radius:8px;font-weight:700;cursor:pointer;" onclick="closeBugReportModal()">Anuluj</button>';
        html += '<a href="/moje_zgloszenia_bledow" class="btn-action btn-outline" style="text-decoration:none;border:1px solid #cbd5e1;padding:8px 16px;border-radius:8px;color:#334155;font-weight:700;display:inline-flex;align-items:center;justify-content:center;">Moje zgłoszenia</a>';
        html += '</div></form>';
        
        if (window.showQuickPopup) {
            showQuickPopup('🐞 Zgłoś błąd / usprawnienie w systemie', html);
        }
        
        // Limit 3 files
        var fileInput = document.getElementById('bugScreenshots');
        if (fileInput) {
            fileInput.addEventListener('change', function(e) {
                if (this.files.length > 3) {
                    alert('Możesz dodać maksymalnie 3 zrzuty ekranu!');
                    this.value = '';
                    document.getElementById('bugFileCountMsg').innerText = '';
                } else {
                    document.getElementById('bugFileCountMsg').innerText = 'Wybrano zrzutów: ' + this.files.length;
                }
            });
        }
    }

    function submitBugReport() {
        var form = document.getElementById('bugReportForm');
        if(!form.checkValidity()) {
            form.reportValidity();
            return;
        }
        
        var btn = form.querySelector('.btn-success');
        var originalText = btn.innerText;
        btn.innerText = 'Wysyłanie...';
        btn.disabled = true;
        
        var formData = new FormData(form);
        formData.append('sciezka', window.location.pathname + window.location.search);
        
        fetch('/api/zglos_blad_systemu', {
            method: 'POST',
            body: formData
        }).then(r => r.json()).then(j => {
            btn.disabled = false;
            btn.innerText = originalText;
            if(j && j.success) {
                if (typeof safeAlert === 'function') {
                    safeAlert('Sukces', 'Dziękujemy! Błąd został zapisany.');
                } else {
                    alert('Sukces: Dziękujemy! Błąd został zapisany.');
                }
                closeBugReportModal();
            } else {
                if (typeof safeAlert === 'function') {
                    safeAlert('Błąd', (j && j.message) || 'Wystąpił problem przy wysyłaniu zgłoszenia.');
                } else {
                    alert((j && j.message) || 'Wystąpił problem przy wysyłaniu zgłoszenia.');
                }
            }
        }).catch(e => {
            btn.disabled = false;
            btn.innerText = originalText;
            if (typeof safeAlert === 'function') {
                safeAlert('Błąd sieci', 'Nie udało się połączyć z serwerem.');
            } else {
                alert('Nie udało się połączyć z serwerem.');
            }
        });
    }


    function ackBugIconIntro() {
        const modal = document.getElementById('bugIconIntroModal');
        if (modal) modal.style.display = 'none';
        
        fetch('/api/ack_bug_icon_intro', {
            method: 'POST',
            credentials: 'same-origin',
            headers: { 
                'Content-Type': 'application/json',
                'X-Requested-With': 'XMLHttpRequest'
            }
        }).catch(err => console.error('Failed to ack bug icon intro:', err));
    }

    function toggleLanguageMenu() {
        const menu = document.getElementById('languageMenu');
        if (menu) {
            menu.classList.toggle('hidden');
        }
    }

    document.addEventListener('click', function(e) {
        const toggle = document.querySelector('.language-toggle');
        const menu = document.getElementById('languageMenu');
        if (menu && !menu.classList.contains('hidden')) {
            if (toggle && !toggle.contains(e.target) && !menu.contains(e.target)) {
                menu.classList.add('hidden');
            }
        }
    });

    // Unified system-state real-time polling to refresh views automatically
    (function() {
        // Only run for logged in users
        const isUserLoggedIn = "{{ session.get('zalogowany')|default('') }}";
        if (!isUserLoggedIn) return;

        let sessionStateSum = 0;
        const linia = "{{ session.get('selected_hall_view')|default('PSD') }}";

        function checkSystemState() {
            fetch('/api/system_state?linia=' + linia, {
                credentials: 'same-origin',
                headers: { 'X-Requested-With': 'XMLHttpRequest', 'Accept': 'application/json' }
            })
            .then(response => {
                if (response.status === 401) {
                    window.location.replace('/login');
                    return null;
                }
                if (!response.ok) return null;
                return response.json();
            })
            .then(data => {
                if (!data || !data.state) return;
                
                const s = data.state;
                const currentSum = Number(s.last_pallet_psd || 0) +
                                   Number(s.last_pallet_agro || 0) +
                                   Number(s.last_plan || 0) +
                                   Number(s.last_zasyp_psd || 0) +
                                   Number(s.last_zasyp_agro || 0) +
                                   Number(s.last_awaria || 0) +
                                   Number(s.last_dosypka_psd || 0) +
                                   Number(s.last_dosypka_agro || 0) +
                                   Number(s.state_dosypka || 0);

                if (sessionStateSum === 0) {
                    sessionStateSum = currentSum;
                    return;
                }

                if (currentSum !== sessionStateSum) {
                    sessionStateSum = currentSum;
                    
                    // Ciche odświeżenie (tylko na stronach które to obsługują, np. dashboard)
                    if (typeof window.performPartialReload === 'function') {
                        window.performPartialReload({ preserveScroll: true, source: 'system-state-sync' });
                    }
                }
            })
            .catch(() => {});
        }

        // Poll every 4 seconds
        setInterval(checkSystemState, 4000);
        // Initial check after a brief delay
        setTimeout(checkSystemState, 1000);
    })();
</script>
