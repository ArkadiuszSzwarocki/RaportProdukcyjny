<style>
.sidebar-header-wrapper {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding-right: 15px;
}
.sidebar-logo-container {
    flex-grow: 1;
}
.bug-alert-icon {
    position: relative;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    color: #ef4444;
    text-decoration: none;
    animation: pulse-red 2s infinite;
    transition: transform 0.2s;
}
.bug-alert-icon:hover {
    transform: scale(1.1);
    color: #dc2626;
}
.bug-alert-icon .material-icons {
    font-size: 24px;
}
.bug-badge {
    position: absolute;
    top: -5px;
    right: -8px;
    background: #ef4444;
    color: white;
    font-size: 10px;
    font-weight: bold;
    padding: 2px 5px;
    border-radius: 10px;
    border: 2px solid #1e293b; /* Match dark sidebar bg */
}
@keyframes pulse-red {
    0% { transform: scale(1); filter: drop-shadow(0 0 0 rgba(239, 68, 68, 0.7)); }
    50% { transform: scale(1.05); filter: drop-shadow(0 0 8px rgba(239, 68, 68, 0.9)); }
    100% { transform: scale(1); filter: drop-shadow(0 0 0 rgba(239, 68, 68, 0)); }
}
@keyframes pulse-amber {
    0% { transform: scale(1); filter: drop-shadow(0 0 0 rgba(245, 158, 11, 0.7)); }
    50% { transform: scale(1.05); filter: drop-shadow(0 0 8px rgba(245, 158, 11, 0.9)); }
    100% { transform: scale(1); filter: drop-shadow(0 0 0 rgba(245, 158, 11, 0)); }
}
</style>
<div class="sidebar-header-wrapper">
    <div class="sidebar-logo sidebar-logo-container">AGRO<span class="logo-accent">MES</span></div>
    {% if unread_bug_reports_count and unread_bug_reports_count > 0 %}
    <a href="{{ url_for('admin.admin_ustawienia_bugs') }}" class="bug-alert-icon" title="Masz {{ unread_bug_reports_count }} nieprzeczytanych zgłoszeń błędów">
        <span class="material-icons">bug_report</span>
        <span class="bug-badge">{{ unread_bug_reports_count }}</span>
    </a>
    {% endif %}
    {% if system_errors_count and system_errors_count > 0 %}
    <a href="{{ url_for('admin.ustawienia_errors') }}" class="bug-alert-icon" style="color: #f59e0b; margin-left: 10px; animation: pulse-amber 2s infinite;" title="Wykryto {{ system_errors_count }} błędów systemowych (Error Trap)">
        <span class="material-icons">warning</span>
        <span class="bug-badge" style="background: #f59e0b;">{{ system_errors_count }}</span>
    </a>
    {% endif %}
</div>

{% if can_switch_halls %}
<div class="hall-switcher">
    <div class="switcher-label">Pracujesz dziś na:</div>
    <div class="switcher-controls">
        <a href="{{ url_for('main.set_hall_view', hall='PSD', sekcja=request.args.get('sekcja'), data=request.args.get('data')) }}" 
           class="switcher-btn {% if effective_hall == 'PSD' %}active{% endif %}" title="Hala PSD">PSD</a>
        <a href="{{ url_for('main.set_hall_view', hall='AGRO', sekcja=request.args.get('sekcja'), data=request.args.get('data')) }}" 
           class="switcher-btn {% if effective_hall == 'AGRO' %}active{% endif %}" title="Hala AGRO">AGRO</a>
        <a href="{{ url_for('main.set_hall_view', hall='ALL', sekcja=request.args.get('sekcja'), data=request.args.get('data')) }}" 
           class="switcher-btn {% if effective_hall == 'ALL' %}active{% endif %}" title="Wszystkie hale">A</a>
    </div>
</div>
{% endif %}
