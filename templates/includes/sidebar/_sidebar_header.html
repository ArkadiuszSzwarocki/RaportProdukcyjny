<div class="sidebar-logo">AGRO<span class="logo-accent">MES</span></div>

{% if can_switch_halls %}
<div class="hall-switcher">
    <div class="switcher-label">Pracujesz dziś na:</div>
    <div class="switcher-controls">
        <a href="{{ url_for('main.set_hall_view', hall='PSD', sekcja=request.args.get('sekcja'), data=request.args.get('data')) }}" 
           class="switcher-btn {% if effective_hall == 'PSD' %}active{% endif %}" title="Hala PSD">PSD</a>
        <a href="{{ url_for('main.set_hall_view', hall='AGRO', sekcja=request.args.get('sekcja'), data=request.args.get('data')) }}" 
           class="switcher-btn {% if effective_hall == 'AGRO' %}active{% endif %}" title="Hala AGRO">AGRO</a>
        <a href="{{ url_for('main.set_hall_view', hall='ALL', sekcja=request.args.get('sekcja'), data=request.args.get('data')) }}" 
           class="switcher-btn {% if effective_hall == 'ALL' %}active{% endif %}" title="Wszystkie hale">A</a>
    </div>
</div>
{% endif %}
