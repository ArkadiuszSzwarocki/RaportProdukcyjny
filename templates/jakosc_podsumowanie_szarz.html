{% extends "layout.html" %}
{% block content %}
<div class="section-box p-15">
    <h2>Podsumowanie szarż — Jakość</h2>
    <p class="small text-muted">Lista wszystkich zarejestrowanych szarż z dosypkami i uwagami.</p>
    <div style="margin-bottom:10px; display:flex; gap:8px; align-items:center;">
        <button id="show-current-btn" class="btn btn-sm">Pokaż bieżące</button>
        <button id="refresh-btn" class="btn btn-sm">Odśwież</button>
        <div id="refresh-msg" class="small text-muted" style="margin-left:8px;"></div>
    </div>

    <form id="jakoscFilters" method="get" action="/jakosc/podsumowanie_szarz" style="margin-bottom:12px;display:flex;gap:8px;align-items:center;flex-wrap:wrap">
        <label class="small">Data: <input type="date" name="date" value="{{ request.args.get('date','') }}"></label>
        <label class="small">Okres:
            <select name="period">
                <option value="day" {% if request.args.get('period','day')=='day' %}selected{% endif %}>Dzień</option>
                <option value="week" {% if request.args.get('period')=='week' %}selected{% endif %}>Tydzień</option>
                <option value="month" {% if request.args.get('period')=='month' %}selected{% endif %}>Miesiąc</option>
            </select>
        </label>
        <label class="small"><input type="checkbox" name="sz_filter_has_dosypki" value="1" {% if request.args.get('sz_filter_has_dosypki')=='1' %}checked{% endif %}> Z dosypką</label>
        <label class="small"><input type="checkbox" name="sz_filter_no_dosypki" value="1" {% if request.args.get('sz_filter_no_dosypki')=='1' %}checked{% endif %}> Bez dosypki</label>
        <label class="small"><input type="checkbox" name="sz_filter_has_uwagi" value="1" {% if request.args.get('sz_filter_has_uwagi')=='1' %}checked{% endif %}> Z notatką</label>
        <label class="small">Surowiec: <input type="text" name="sz_filter_surowiec" value="{{ request.args.get('sz_filter_surowiec','') }}" placeholder="nazwa surowca"></label>
        <button type="submit" class="btn btn-sm btn-primary">Filtruj</button>
    </form>

    <div id="szarze-list">
        {% include 'jakosc_podsumowanie_szarz_fragment.html' %}
    </div>
</div>


<script>
try {
    (function(){
        var showCurrent = false;
        var btn = document.getElementById('show-current-btn');
        var rbtn = document.getElementById('refresh-btn');
        var msg = document.getElementById('refresh-msg');

        function fetchFragment(){
            msg.textContent = 'Ładowanie...';
            var url = '/jakosc/podsumowanie_szarz/fragment';
            // preserve current query params (filters) when fetching fragment
            var qs = window.location.search || '';
            if(showCurrent){
                // ensure today=1 present
                if(qs && qs.length>1) qs += '&today=1'; else qs = '?today=1';
            }
            if(qs && qs.length>0) url += qs;
            fetch(url, {credentials: 'same-origin'}).then(function(r){
                if(!r.ok) throw new Error('HTTP '+r.status);
                return r.text();
            }).then(function(html){
                var el = document.getElementById('szarze-list');
                if(el) el.innerHTML = html;
                msg.textContent = '';
            }).catch(function(e){
                msg.textContent = 'Błąd odświeżania';
                console.error(e);
            });
        }

        if(btn){
            btn.addEventListener('click', function(){
                showCurrent = !showCurrent;
                btn.textContent = showCurrent ? 'Pokaż wszystkie' : 'Pokaż bieżące';
                fetchFragment();
            });
        }
        if(rbtn){
            rbtn.addEventListener('click', function(){ fetchFragment(); });
        }

        // Optionally auto-refresh every 60s
        // setInterval(fetchFragment, 60000);
    })();
} catch(e){ console.error('init podsumowanie szarz js', e); }
</script>

{% endblock %}
