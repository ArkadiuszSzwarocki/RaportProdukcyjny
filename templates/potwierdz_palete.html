<form id="potwierdz-form" action="{{ url_for('warehouse.potwierdz_palete', paleta_id=paleta_id) }}" method="POST" onsubmit="submitForm(event)" style="display:flex; flex-direction:column; gap:12px;">
<input type="hidden" name="linia" value="{{ linia or 'PSD' }}">
  <div class="form-field">
    <label for="waga_palety">Waga rzeczywista (kg)</label>
    <input id="waga_palety" name="waga_palety" type="number" min="0" step="0.1" value="" required class="input-sm" placeholder="Zważ paletę i wpisz wagę">
  </div>
  <div style="display:flex; gap:8px;">
    <button type="submit" class="btn-action btn-success" style="flex:1;">{{ _('zatwierdz_btn') }}</button>
    <button type="button" class="btn-action btn-action-cancel" style="flex:1;" data-action="close-popup">ANULUJ</button>
  </div>
</form>

<!-- Modal popup dla różnic -->
<div id="difference-modal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.55); z-index:99999; align-items:center; justify-content:center; padding:32px;">
  <div style="background:white; border-radius:24px; padding:48px; max-width:980px; width:min(980px, 95vw); box-shadow:0 28px 90px rgba(15,23,42,0.4); text-align:center; position:relative; z-index:100000;">
    <div style="font-size:64px; margin-bottom:20px;">⚠️</div>
    <h3 style="margin:0 0 16px 0; color:#dc2626; font-size:28px; font-weight:800;">Różnica w wadze palety</h3>
    <p style="margin:0 0 24px 0; color:#475569; font-size:20px; line-height:1.7;">
      Zarejestrowana waga palety różni się od deklaracji o <strong id="modal-diff"></strong> kg.
    </p>
    <p style="margin:0 0 32px 0; color:#64748b; font-size:18px;">Paleta została przyjęta. Różnica jest zarejestrowana w systemie.</p>
    <button type="button" onclick="closeDifferenceModal()" style="background:#2563eb; color:white; border:none; padding:16px 48px; border-radius:14px; font-weight:700; cursor:pointer; font-size:20px;">OK, zamknij</button>
  </div>
</div>

<script>
  function submitForm(event) {
    event.preventDefault();
    var wagaInput = document.getElementById('waga_palety');
    var waga = parseFloat(wagaInput.value);
    
    if (!waga) {
      alert('Wpisz wagę');
      return;
    }
    
    var btn = event.target.querySelector('button[type="submit"]');
    if (btn) {
      btn.disabled = true;
      btn.innerHTML = 'TRWA ZAPISYWANIE...';
    }
    
    var liniaInput = document.querySelector('input[name="linia"]');
    var linia = liniaInput ? String(liniaInput.value || '') : '';

    fetch('{{ url_for("warehouse.potwierdz_palete", paleta_id=paleta_id) }}', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/x-www-form-urlencoded',
        'X-Requested-With': 'XMLHttpRequest'
      },
      body: 'waga_palety=' + encodeURIComponent(waga) + '&linia=' + encodeURIComponent(linia)
    })
    .then(r => r.json())
    .then(j => {
      if (j && j.success) {
        if (j.has_difference) {
          document.getElementById('modal-diff').textContent = j.difference;
          showDifferenceModal();
        } else {
          // Brak różnicy - zamknij popup i odśwież
          try {
            var qp = document.querySelector('.quick-popup');
            if (qp && qp.parentNode) {
              var closeBtn = qp.parentNode.querySelector('.qp-close');
              if (closeBtn) closeBtn.click();
            }
          } catch(e) {}
          setTimeout(() => location.reload(), 500);
        }
      } else {
        alert('Błąd: ' + (j && j.message ? j.message : 'Nie udało się zatwierdzić'));
      }
    })
    .catch(e => {
      alert('Błąd sieci: ' + e.message);
    });
  }
  
  function showDifferenceModal() {
    var modal = document.getElementById('difference-modal');
    if (!modal) {
      return;
    }
    if (!modal.dataset.attached) {
      try {
        document.body.appendChild(modal);
        modal.dataset.attached = '1';
      } catch (e) {}
    }
    modal.style.display = 'flex';
  }
  
  function closeDifferenceModal() {
    document.getElementById('difference-modal').style.display = 'none';
    // Zamknij quick-popup
    try {
      var qp = document.querySelector('.quick-popup');
      if (qp && qp.parentNode) {
        var closeBtn = qp.parentNode.querySelector('.qp-close');
        if (closeBtn) closeBtn.click();
      }
    } catch(e) {}
    setTimeout(() => location.reload(), 500);
  }
</script>
