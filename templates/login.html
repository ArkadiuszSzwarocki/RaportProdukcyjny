<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logowanie - AgroNetzwerk</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <!-- Favicon -->
    <link rel="icon" href="{{ url_for('static', filename='favicon.ico') }}" type="image/x-icon">
    <link rel="shortcut icon" href="{{ url_for('static', filename='favicon.ico') }}">
    <style>
        .language-selector-container {
            position: absolute;
            top: 10px;
            right: 10px;
            z-index: 100;
        }
        
        #language-selector {
            padding: 5px 10px;
            border-radius: 4px;
            border: 1px solid #ccc;
            cursor: pointer;
        }

        .btn-login {
            display: block;
            margin: 20px auto 0 !important;
            padding: 8px 24px !important;
            font-size: 14px !important;
            width: auto !important;
        }

        .printer-server-box {
            margin-top: 16px;
            padding-top: 10px;
            border-top: 1px solid #e5e7eb;
            text-align: center;
        }

        .btn-printer-start {
            display: inline-block;
            margin: 8px 0 0;
            padding: 8px 16px;
            border: 1px solid #16a34a;
            border-radius: 6px;
            background: #16a34a;
            color: #fff;
            font-size: 13px;
            cursor: pointer;
        }

        .btn-printer-start:disabled {
            opacity: 0.65;
            cursor: not-allowed;
        }

        .printer-server-status {
            min-height: 18px;
            margin-top: 8px;
            font-size: 12px;
            color: #475569;
        }
    </style>
</head>
<body class="login-page">

<!-- Language selector -->
<div class="language-selector-container">
    <label for="language-selector" class="sr-only">{{ _('language') }}</label>
    <select id="language-selector" onchange="changeLanguage(this.value)" title="Select language">
        <option value="pl">Polski</option>
        <option value="uk">Українська</option>
        <option value="en">English</option>
    </select>
</div>

<div class="login-page-body">
<div class="login-card">
    <!-- Use local static logo to avoid external requests and improve availability -->
    <img src="{{ url_for('static', filename='agro_logo.png') }}" alt="AgroNetzwerk" class="login-logo">

    <h2 class="header-title m-0">{{ _('zaloguj_sie') }}</h2>

    {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
            {% for category, message in messages %}
                <div class="alert alert-{{ category }}">
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}
    {% endwith %}

    {% if request.args.get('timeout') %}
        <div class="alert alert-warning">
            Zostałeś wylogowany z powodu bezczynności.
        </div>
    {% endif %}

    <form method="POST">
        <div class="form-group">
            <label for="login" class="form-label">{{ _('login') }}</label>
            <input type="text" id="login" name="login" class="form-input" placeholder="{{ _('wpisz_login') }}" required aria-label="Login">
        </div>
        <div class="form-group">
            <label for="haslo" class="form-label">{{ _('haslo') }}</label>
            <input type="password" id="haslo" name="haslo" class="form-input" placeholder="{{ _('wpisz_haslo') }}" required aria-label="Hasło">
        </div>
        <button type="submit" class="btn-login">{{ _('wejdz') }}</button>
    </form>

    <div class="printer-server-box">
        <button type="button" id="btn-start-printer-server" class="btn-printer-start">Wlacz serwer druku</button>
        <div id="printer-server-status" class="printer-server-status"></div>
    </div>

    </div>
    </div>

<script>
function changeLanguage(lang) {
    // Ustaw cookie na 365 dni
    const d = new Date();
    d.setTime(d.getTime() + (365*24*60*60*1000));
    const expires = "expires="+ d.toUTCString();
    document.cookie = "app_language=" + lang + ";" + expires + ";path=/";
    
    // Refresh strony z ?lang= parametrem
    window.location.href = window.location.pathname + "?lang=" + lang;
}

function parseJsonResponse(response) {
    return response.text().then(function(text) {
        try {
            return {
                ok: response.ok,
                status: response.status,
                data: text ? JSON.parse(text) : {}
            };
        } catch (error) {
            return {
                ok: false,
                status: response.status,
                data: { success: false, message: 'Nieprawidlowa odpowiedz serwera.' }
            };
        }
    });
}

function setPrinterStatus(message, isError) {
    const statusEl = document.getElementById('printer-server-status');
    if (!statusEl) {
        return;
    }
    statusEl.textContent = message || '';
    statusEl.style.color = isError ? '#b91c1c' : '#166534';
}

function startPrinterServerFromLogin() {
    const button = document.getElementById('btn-start-printer-server');
    if (!button) {
        return;
    }

    const pin = window.prompt('Podaj PIN, aby uruchomic serwer druku:');
    if (pin === null) {
        return;
    }

    button.disabled = true;
    setPrinterStatus('Uruchamianie serwera druku...', false);

    fetch('/api/printer-server/start', {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json',
            'X-Requested-With': 'XMLHttpRequest'
        },
        body: JSON.stringify({ pin: pin.trim() })
    })
        .then(parseJsonResponse)
        .then(function(result) {
            const payload = result.data || {};
            if (result.ok && payload.success) {
                setPrinterStatus(payload.message || 'Serwer druku uruchomiony.', false);
                return;
            }
            setPrinterStatus(payload.message || 'Nie udalo sie uruchomic serwera druku.', true);
        })
        .catch(function(error) {
            setPrinterStatus('Blad polaczenia: ' + error.message, true);
        })
        .finally(function() {
            button.disabled = false;
        });
}

// Ustawiamy selektor na domyślny się wybrany język z cookie
window.addEventListener('DOMContentLoaded', function() {
    const langSelector = document.getElementById('language-selector');
    const startPrinterServerButton = document.getElementById('btn-start-printer-server');
    if (langSelector) {
        // Czytaj język z URL lub cookie
        const urlParams = new URLSearchParams(window.location.search);
        const langParam = urlParams.get('lang');
        const langCookie = document.cookie.split('; ').find(row => row.startsWith('app_language='));
        const currentLang = langParam || (langCookie ? langCookie.split('=')[1] : 'pl');
        
        langSelector.value = currentLang;
    }

    if (startPrinterServerButton) {
        startPrinterServerButton.addEventListener('click', startPrinterServerFromLogin);
    }
});
</script>
</body>
</html>
