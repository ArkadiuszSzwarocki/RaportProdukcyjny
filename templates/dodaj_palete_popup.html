<div class="p-10" {% if sekcja == 'Zasyp' %}data-popup-title="Dodajesz szarże"{% else %}data-popup-title="Dodajesz paletę"{% endif %}>
  <h3 class="popup-title">{% if sekcja == 'Zasyp' %}➕ Dodaj szarżę{% else %}📦 {{ _('dodaj_palete') }}{% endif %}</h3>
  {% if sekcja == 'Workowanie' %}
  {# Workowanie: użyj dedykowanego endpointu dodaj_palete #}
  <form action="{{ url_for('warehouse.dodaj_palete', plan_id=plan_id) }}" method="POST" onsubmit="this.querySelector('button[type=submit]').disabled=true; this.querySelector('button[type=submit]').innerHTML='ZAPISYWANIE...';">
    <input id="waga_palety" name="waga_palety" type="number" step="1" min="1" required class="input-sm popup-input" autofocus placeholder="{{ _('waga_palety') }}" title="{{ _('waga_palety_kg_info') }}">
    
    <div class="popup-button-group">
      <button type="submit" class="btn-action btn-save">{{ _('dodaj_palete') }}</button>
      <button type="button" class="btn-action btn-outline" onclick="try{ document.querySelector('.quick-popup').parentNode.querySelector('.qp-close').click(); }catch(e){}">ANULUJ</button>
    </div>
  </form>
  {% else %}
  {# Zasyp: użyj dodaj_plan dla szarży #}
  <form action="{{ url_for('planning.dodaj_plan') }}" method="POST" onsubmit="this.querySelector('button[type=submit]').disabled=true; this.querySelector('button[type=submit]').innerHTML='ZAPISYWANIE...';">
    <input id="tonaz" name="tonaz" type="number" step="1" min="1" required class="input-sm popup-input" autofocus placeholder="{{ _('waga_szarzy_kg') }}" title="{{ _('waga_szarzy_kg_info') }}">
    
    <label style="margin-top: 10px; display: block; font-size: 13px;">Numer szarży:</label>
    <input id="nr_szarzy" name="nr_szarzy" type="number" step="1" min="1" required class="input-sm popup-input" placeholder="Podaj nr szarży zaczynając od 1" title="Podaj z jakiego numeru szarży jest ten zasyp (wymagane weryfikowanie z recepturą)">

    
    <!-- Produkt i typ - ukryte (brane automatycznie z systemu) -->
    <input type="hidden" name="produkt" value="{{ produkt or '' }}">
    <input type="hidden" name="typ_produkcji" value="{{ typ or 'worki_zgrzewane_25' }}">
    <input type="hidden" name="plan_id" value="{{ plan_id or '' }}">
    <input type="hidden" name="sekcja" value="Zasyp">
    
    <div class="popup-button-group">
      <button type="submit" class="btn-action btn-save">{{ _('dodaj_szarze') }}</button>
      <button type="button" class="btn-action btn-outline" onclick="try{ document.querySelector('.quick-popup').parentNode.querySelector('.qp-close').click(); }catch(e){}">ANULUJ</button>
    </div>
  </form>
  {% endif %}
</div>
