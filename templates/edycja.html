<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ _('edycja_wpisu') }}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="edycja-page">

<div class="box">
    <h2>✏️ {{ _('edytuj_zgloszenie') }}</h2>
    <form method="POST" action="{{ url_for('journal.edytuj', id=wpis[0]) }}">
        
        <label for="kategoria">{{ _('rodzaj_problemu') }}</label>
        <select id="kategoria" name="kategoria" aria-label="Rodzaj problemu">
              <option value="Awaria" {% if wpis[7] == 'Awaria' %}selected{% endif %}>🔴 Awaria</option>
              <option value="Postój" {% if wpis[7] == 'Postój' %}selected{% endif %}>🟠 Postój</option>
              <option value="Mikro zatrzymanie" {% if wpis[7] == 'Mikro zatrzymanie' %}selected{% endif %}>🔵 Mikro zatrzymanie</option>
              <option value="Usterka" {% if wpis[7] == 'Usterka' %}selected{% endif %}>🟣 Usterka</option>
        </select>

          <label>{{ _('godzina_start') }}</label>
              <input type="time" name="czas_start" value="{{ wpis[4] if wpis[4] else '' }}" title="{{ _('wprowadz_godzine_start') }}" placeholder="{{ _('hh_mm_maly') }}" aria-label="Godzina start">

          <label>{{ _('godzina_koniec') }}</label>
              <input type="time" name="czas_stop" value="{{ wpis[5] if wpis[5] else '' }}" title="{{ _('wprowadz_godzine_koniec') }}" placeholder="{{ _('hh_mm_maly') }}" aria-label="Godzina koniec">

        <label for="status">{{ _('status_label') }}</label>
        <select id="status" name="status" aria-label="Status">
            <option value="zgłoszone" {% if wpis[6] == 'zgłoszone' %}selected{% endif %}>🔔 Zgłoszone</option>
            <option value="czeka_na_czesci" {% if wpis[6] == 'czeka_na_czesci' %}selected{% endif %}>⚙️ Czeka na części</option>
            <option value="w_trakcie_naprawy" {% if wpis[6] == 'w_trakcie_naprawy' %}selected{% endif %}>🔧 W trakcie naprawy</option>
            <option value="zakończone" {% if wpis[6] == 'zakończone' %}selected{% endif %}>✅ Zakończone</option>
        </select>

        <label for="data_zakonczenia">{{ _('data_zakonczenia') }}</label>
        <input type="date" id="data_zakonczenia" name="data_zakonczenia" value="{{ wpis[10] if wpis[10] else '' }}" title="{{ _('data_ukonczone') }}" aria-label="Data zakończenia">

        <label>{{ _('opis_szczegolowy') }}</label>
           <textarea name="problem" rows="4" title="{{ _('wprowadz_opis') }}" placeholder="Opisz problem...">{{ wpis[3] }}</textarea>

        <button type="submit" class="btn-save">💾 ZAPISZ ZMIANY</button>
        <a href="/" class="btn-cancel">{{ _('anuluj') }}</a>
    </form>
</div>

</body>
</html>
